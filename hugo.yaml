        jobs:
          - name: "Senior Software Developer"
            date: "Jan 2023 - present"
            content: "I am currently working as a senior software developer at [example org.](https://example.com) in San Francisco, CA. I am currently working on a project that will be used to help people find the best way to get around the city."
            info:
              content: Working as a senior software developer
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-brands fa-react
                  url: https://react.dev/
                  tooltip: Example tooltip content
                - icon: fab fa-x-twitter
                  url: https://example.com
                  # tooltip: Example tooltip content
              customIcons:
                - icon: /fav.png
                  url: "https://example.com"
                  tooltip: Example tooltip content
          - name: "Software Developer"
            date: "Aug 2023 - Dec 2023"
            content: "I worked as a software developer. I worked on a project that will be used to help people find the best way to get around the city."

      - company: "Google"
        companyUrl: "https://example.com"
        jobs:
        - name: "Product Designer"
          date: "Feb 2016 - Mar 2017"
          content: "I am currently working as a software developer at [example org.](https://example.com) in San Francisco, CA. I am currently working on a project that will be used to help people find the best way to get around the city."

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:

      - title: "Bachelor of Science in Game Programming"
        school:
          name: "University of East London"
          url: "https://www.uel.ac.uk"
        date: "2023 - present"
        #           - [Fast and Accurate Object Detection with a Single Convolutional Neural Network](https://example.com You may insert a link like in obsidian
        content: |-
          I am working on a dissertation which is about the topic of Procedural Environment Generation.

          During the course, the modules taught concepts such as OOP, Design Patterns, and SOLID principles. The course placed a lot of focus on group work and collaboration with game designers and artists.

          Extracurricular Activities
            - Course Representative for 3 years.
            - Ran a multi-year spanning Advanced Dungeons & Dragons 2nd Edition campaign for my classmates
        featuredLink:
          enable: false
          name: "My academic record"
          url: "https://example.com"


